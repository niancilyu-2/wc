<!--
ABOUTME: Standalone live-scores / schedule page for the WC 2026 bracket.
ABOUTME: Loads matches from Supabase and overlays MOCK_TOURNAMENT for the preview.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live scores · 2026 World Cup Bracket Challenge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&family=Oswald:wght@400;500;600;700&family=Share+Tech+Mono&display=swap">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="site-header">
    <h1 class="wordmark">
      <a class="wordmark-link" href="index.html">
        <svg class="wordmark-mark" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 5 H22 V13 C22 16.5 19.3 19 16 19 C12.7 19 10 16.5 10 13 Z" />
          <path d="M10 7 C6 7.3 6 12.5 10 13.2" />
          <path d="M22 7 C26 7.3 26 12.5 22 13.2" />
          <path d="M16 19 V23.5" />
          <path d="M12 23.5 H20" />
          <path d="M10 26 H22" />
        </svg>
        <span class="wordmark-text">
          <span class="wordmark-top">
            <span class="wordmark-lead">World Cup</span>
            <span class="wordmark-year">&rsquo;26</span>
          </span>
          <span class="wordmark-sub">Bracket Challenge</span>
        </span>
      </a>
    </h1>
    <nav class="site-nav">
      <a href="index.html">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 3 L4 8 L10 13" />
        </svg>
        Back to picks
      </a>
      <a href="leaderboard.html">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="1" y="8" width="4" height="7" />
          <rect x="6" y="4" width="4" height="11" />
          <rect x="11" y="10" width="4" height="5" />
        </svg>
        Leaderboard
      </a>
      <a href="rules.html">
        <svg class="nav-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="3" width="10" height="12" rx="1" />
          <path d="M6 2 H10 V4 H6 Z" />
          <path d="M6 8 H11" />
          <path d="M6 11 H11" />
        </svg>
        Rules &amp; scoring
      </a>
    </nav>
  </header>

  <section id="ticker-bar" aria-label="Tournament facts">
    <div class="ticker-track" id="ticker-track"></div>
  </section>

  <main class="livescores-main">
    <section class="ls-intro">
      <h2>Live scores</h2>
      <p class="section-help">Every match on one page. Sections expand around the next scheduled match; tap any section to peek ahead or back.</p>
    </section>

    <div id="livescores-root">
      <div class="ls-loading">Loading match schedule&hellip;</div>
    </div>
  </main>

  <footer id="site-footer">
    <div class="sig">
      Nianci <span class="sig-dot">×</span> Claude
    </div>
  </footer>

  <script src="ticker.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="mock-results.js"></script>
  <script src="livescores.js" defer></script>
</body>
</html>

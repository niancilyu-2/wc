<!--
ABOUTME: Root HTML page for WC 2026 bracket pick'em.
ABOUTME: Static shell; all dynamic content rendered by app.js.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Bracket</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.2.3/css/flag-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="site-header">
    <h1>WC 2026 BRACKET</h1>
    <nav class="site-nav">
      <a href="rules.html">Rules &amp; scoring</a>
    </nav>
    <div id="user-bar"></div>
  </header>

  <main>
    <section id="status-section">
      <div id="status-bar"></div>
    </section>

    <section id="groups-section">
      <h2>Group Stage Picks</h2>
      <p class="section-help">Pick who finishes 1st and 2nd in each group.</p>
      <div id="groups-grid"></div>
      <div id="groups-actions" class="picks-controls"></div>
    </section>

    <section id="bracket-section">
      <h2>Knockout Bracket</h2>
      <p class="section-help">Fill 32 R32 slots, then click winners all the way to the Final.</p>
      <div id="bracket"></div>
    </section>

    <section id="tiebreaker-section">
      <h2>Tiebreaker</h2>
      <p class="section-help">Predict the champion's total goals across the tournament.</p>
      <div id="tiebreaker"></div>
    </section>

    <section id="leaderboard-section">
      <h2>Leaderboard</h2>
      <div id="leaderboard"></div>
    </section>
  </main>

  <div id="global-actions" class="global-actions"></div>

  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>

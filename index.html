<!--
ABOUTME: Root HTML page for WC 2026 bracket pick'em.
ABOUTME: Static shell; all dynamic content rendered by app.js.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WC 2026 Bracket</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="site-header">
    <h1>WC 2026 BRACKET</h1>
    <div id="user-bar"></div>
  </header>

  <main>
    <section id="leaderboard-section">
      <h2>Leaderboard</h2>
      <div id="leaderboard"></div>
    </section>

    <section id="groups-section">
      <h2>Group Stage Picks</h2>
      <div id="groups-grid"></div>
    </section>

    <section id="bracket-section">
      <h2>Knockout Bracket</h2>
      <div id="bracket"></div>
    </section>

    <section id="tiebreaker-section">
      <h2>Tiebreaker</h2>
      <div id="tiebreaker"></div>
    </section>
  </main>

  <div id="modal-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
